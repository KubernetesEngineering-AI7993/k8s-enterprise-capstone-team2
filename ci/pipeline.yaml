name: capstone-platform-ci

on:
  pull_request:
    branches: ["mlops"]
  push:
    branches: ["mlops"]

jobs:
  validate-manifests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yamllint
        run: pip3 install yamllint

      - name: Validate YAML syntax
        run: |
          yamllint k8s gitops monitoring ci

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Lint and render Helm chart
        run: |
          helm lint helm/warehouse-cv
          helm template warehouse-cv helm/warehouse-cv >/tmp/helm-rendered.yaml

      - name: Kustomize dry run
        run: |
          kubectl kustomize k8s/overlays/dev >/tmp/kustomize-rendered.yaml

  trivy-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
