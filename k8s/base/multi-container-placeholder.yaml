apiVersion: v1
kind: Pod
metadata:
  name: warehouse-cv-multi-container-demo
  namespace: warehouse-cv
  labels:
    app: warehouse-cv-multi-container-demo
spec:
  containers:
    - name: primary
      image: ubuntu:22.04
      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "250m"
          memory: "256Mi"
    - name: sidecar
      image: ubuntu:22.04
      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "250m"
          memory: "256Mi"
