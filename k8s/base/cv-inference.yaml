---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cv-inference
  namespace: warehouse-cv
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: cv-inference
  template:
    metadata:
      labels:
        app: cv-inference
    spec:
      serviceAccountName: inference-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: inference
          image: detection-service:v1
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5001
          env:
            - name: HOME
              value: "/tmp"
            - name: INTAKE_URL
              value: "http://intake-svc:8081"
            - name: MODEL_PATH
              value: "best.pt"
            - name: CONFIDENCE_THRESHOLD
              value: "0.25"
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: inference-svc
  namespace: warehouse-cv
spec:
  selector:
    app: cv-inference
  ports:
    - name: http
      port: 8082
      targetPort: 5001
