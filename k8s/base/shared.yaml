apiVersion: v1
kind: ConfigMap
metadata:
  name: warehouse-cv-config
  namespace: warehouse-cv
data:
  DEPLOYMENT_MODE: "live"
  MODEL_REGISTRY_URI: "s3://placeholder-model-registry"
  FOOTAGE_SOURCE: "rtsp://placeholder-camera-stream"
  RESULTS_STORE_URI: "postgres://results-db-placeholder"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: model-artifacts-pvc
  namespace: warehouse-cv
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: trainer-sa
  namespace: warehouse-cv
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: intake-sa
  namespace: warehouse-cv
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: inference-sa
  namespace: warehouse-cv
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dashboard-sa
  namespace: warehouse-cv
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dashboard-readonly
  namespace: warehouse-cv
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints", "configmaps"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dashboard-readonly-binding
  namespace: warehouse-cv
subjects:
  - kind: ServiceAccount
    name: dashboard-sa
    namespace: warehouse-cv
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: dashboard-readonly
