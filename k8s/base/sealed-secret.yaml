# SealedSecret for warehouse-cv object store credentials.
# This file is safe to commit to git. Encrypted values are bound to the
# cluster's Sealed Secrets controller key and cannot be decrypted elsewhere.
#
# To regenerate after rotating credentials, run:
#
#   kubectl create secret generic warehouse-cv-secret \
#     --namespace warehouse-cv \
#     --from-literal=OBJECT_STORE_ACCESS_KEY=<your-key> \
#     --from-literal=OBJECT_STORE_SECRET_KEY=<your-secret> \
#     --dry-run=client -o yaml \
#   | kubeseal \
#       --controller-namespace kube-system \
#       --controller-name sealed-secrets \
#       --format yaml \
#   > k8s/base/sealed-secret.yaml
#
# Requires: kubeseal CLI and network access to the cluster.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: warehouse-cv-secret
  namespace: warehouse-cv
  annotations:
    sealedsecrets.bitnami.com/managed: "true"
spec:
  encryptedData:
    # Replace these placeholder values by running the kubeseal command above.
    OBJECT_STORE_ACCESS_KEY: PLACEHOLDER_SEAL_WITH_KUBESEAL
    OBJECT_STORE_SECRET_KEY: PLACEHOLDER_SEAL_WITH_KUBESEAL
  template:
    metadata:
      name: warehouse-cv-secret
      namespace: warehouse-cv
    type: Opaque
