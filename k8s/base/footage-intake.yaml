---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: footage-intake
  namespace: warehouse-cv
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: footage-intake
  template:
    metadata:
      labels:
        app: footage-intake
    spec:
      serviceAccountName: intake-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: intake
          image: intake-service:v6
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5000
          resources:
            requests:
              cpu: "250m"
              memory: "2Gi"
            limits:
              cpu: "2"
              memory: "3Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: intake-svc
  namespace: warehouse-cv
spec:
  selector:
    app: footage-intake
  ports:
    - name: http
      port: 8081
      targetPort: 5000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: intake-hpa
  namespace: warehouse-cv
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: footage-intake
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
