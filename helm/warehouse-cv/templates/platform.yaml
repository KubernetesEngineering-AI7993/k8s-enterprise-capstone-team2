apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.namespace }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-intake
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.replicaCount.intake }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-intake
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-intake
    spec:
      containers:
        - name: intake
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          resources:
{{ toYaml .Values.resources.intake | indent 12 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-inference
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.replicaCount.inference }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-inference
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-inference
    spec:
      nodeSelector:
{{ toYaml .Values.gpuScheduling.nodeSelector | indent 8 }}
      tolerations:
        - key: {{ .Values.gpuScheduling.toleration.key }}
          operator: Equal
          value: {{ .Values.gpuScheduling.toleration.value | quote }}
          effect: {{ .Values.gpuScheduling.toleration.effect }}
      containers:
        - name: inference
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          resources:
{{ toYaml .Values.resources.inference | indent 12 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-dashboard
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.replicaCount.dashboard }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-dashboard
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-dashboard
    spec:
      containers:
        - name: dashboard
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          resources:
{{ toYaml .Values.resources.dashboard | indent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-intake
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: {{ .Release.Name }}-intake
  ports:
    - name: http
      port: {{ .Values.service.intake.port }}
      targetPort: {{ .Values.service.intake.port }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-inference
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: {{ .Release.Name }}-inference
  ports:
    - name: http
      port: {{ .Values.service.inference.port }}
      targetPort: {{ .Values.service.inference.port }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-dashboard
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: {{ .Release.Name }}-dashboard
  ports:
    - name: http
      port: {{ .Values.service.dashboard.port }}
      targetPort: {{ .Values.service.dashboard.port }}
{{- if .Values.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ingress
  namespace: {{ .Values.namespace }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.hosts.intake }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-intake
                port:
                  number: {{ .Values.service.intake.port }}
    - host: {{ .Values.ingress.hosts.inference }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-inference
                port:
                  number: {{ .Values.service.inference.port }}
    - host: {{ .Values.ingress.hosts.dashboard }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-dashboard
                port:
                  number: {{ .Values.service.dashboard.port }}
{{- end }}
