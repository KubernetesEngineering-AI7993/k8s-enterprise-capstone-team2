namespace: warehouse-cv

image:
  repository: ubuntu
  tag: "22.04"
  pullPolicy: IfNotPresent

replicaCount:
  intake: 2
  inference: 2
  dashboard: 2

service:
  intake:
    port: 8081
  inference:
    port: 8082
  dashboard:
    port: 8080

ingress:
  enabled: true
  className: nginx
  hosts:
    intake: intake.warehouse-cv.local
    inference: inference.warehouse-cv.local
    dashboard: dashboard.warehouse-cv.local

gpuScheduling:
  nodeSelector:
    node-type: gpu
  toleration:
    key: gpu
    value: "true"
    effect: NoSchedule

resources:
  intake:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1
      memory: 1Gi
  inference:
    requests:
      cpu: 500m
      memory: 1Gi
      nvidia.com/gpu: "1"
    limits:
      cpu: 2
      memory: 4Gi
      nvidia.com/gpu: "1"
  dashboard:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
