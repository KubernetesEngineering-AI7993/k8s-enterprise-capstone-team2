apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-vol-demo
  namespace: labs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vol-demo
  template:
    metadata:
      labels:
        app: vol-demo
    spec:
      containers:
      - name: demo
        image: nginx:1.27
        volumeMounts:
        - name: config-volume
          mountPath: /etc/config
        - name: secret-volume
          mountPath: /etc/secret
      volumes:
      - name: config-volume
        configMap:
          name: app-config
      - name: secret-volume
        secret:
          secretName: app-secret