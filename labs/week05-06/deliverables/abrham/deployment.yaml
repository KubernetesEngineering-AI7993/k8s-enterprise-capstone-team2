apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  namespace: labs
  labels:
    app: nginx
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx 
  template:
    metadata:
      labels:
        app: nginx 
    spec:
      containers:
      - name: nginx
        image: nginx:1.27
        ports:
        - containerPort: 80
        livenessProbe:
          httpGet:
            path: /                 
            port: 80                
          initialDelaySeconds: 5    
          periodSeconds: 10         
          failureThreshold: 3       
          successThreshold: 1       
          timeoutSeconds: 2 
        readinessProbe:
          httpGet:
            path: /                 
            port: 80                
          initialDelaySeconds: 3    
          periodSeconds: 5          
          failureThreshold: 3       
          successThreshold: 1       
          timeoutSeconds: 2           
        envFrom:
          - configMapRef:
              name: app-config
          - secretRef:
              name: app-secret 
        volumeMounts:
          - name: config-volume 
            mountPath: /etc/config
          - name: secret-volume
            mountPath: /etc/secret
            readOnly: true
      volumes:
        - name: config-volume
          configMap:
            name: app-config
        - name: secret-volume 
          secret:
            secretName: app-secret  

