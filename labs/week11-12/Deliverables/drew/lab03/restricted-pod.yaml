apiVersion: v1
kind: Pod
metadata:
  name: secure-pod
  namespace: restricted
spec:
  containers:
  - name: app
    image: nginxinc/nginx-unprivileged:1.27
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      seccompProfile:
        type: RuntimeDefault