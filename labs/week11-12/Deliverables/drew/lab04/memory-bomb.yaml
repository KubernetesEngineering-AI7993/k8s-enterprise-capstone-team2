apiVersion: v1
kind: Pod
metadata:
  name: memory-bomb
  namespace: default
spec:
  containers:
  - name: stress
    image: polinux/stress
    command: ["stress"]
    args: ["--vm", "1", "--vm-bytes", "256M", "--timeout", "60s"]
    resources:
      requests:
        memory: 64Mi
      limits:
        memory: 128Mi