apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pod-reader
  namespace: dev
  labels:
    app: readonly-app
    env: dev
  annotations:
    description: "Grants read-only access to Pods only — no write, no exec, no logs"
rules:
  - apiGroups: [""]        
    resources: ["pods"]    
    verbs: ["get", "list"] 
