apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pod-reader-binding
  namespace: dev
  labels:
    app: readonly-app
    env: dev
  annotations:
    description: "Binds pod-reader Role to readonly-app-sa within the dev namespace only"
subjects:
  - kind: ServiceAccount
    name: readonly-app-sa    
    namespace: dev            
roleRef:
  kind: Role                 
  name: pod-reader          
  apiGroup: rbac.authorization.k8s.io
