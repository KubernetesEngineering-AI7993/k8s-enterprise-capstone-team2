apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend-to-backend
  namespace: dev
  labels:
    env: dev
    policy: allow-frontend-backend
  annotations:
    description: "Allows frontend Pods to reach backend Pods on TCP 8080 only"
spec:
  podSelector:
    matchLabels:
      app: backend          
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: frontend 
      ports:
        - protocol: TCP
          port: 8080        

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend-egress-to-backend
  namespace: dev
  labels:
    env: dev
    policy: allow-frontend-backend
  annotations:
    description: "Allows frontend Pods to open outbound connections to backend on TCP 8080"
spec:
  podSelector:
    matchLabels:
      app: frontend         
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: backend  
      ports:
        - protocol: TCP
          port: 8080

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: dev
  labels:
    env: dev
    policy: allow-dns
  annotations:
    description: "Re-opens UDP/TCP 53 to kube-system so CoreDNS resolution works after default-deny"
spec:
  podSelector: {}          
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system  
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
