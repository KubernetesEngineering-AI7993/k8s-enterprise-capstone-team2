apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: dev
  labels:
    env: dev
    policy: default-deny
  annotations:
    description: "Deny ALL ingress and egress for every Pod in dev unless another policy explicitly allows it"
spec:
  podSelector: {}       
  policyTypes:
    - Ingress            
    - Egress             
  
