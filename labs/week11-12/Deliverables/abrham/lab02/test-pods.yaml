apiVersion: v1
kind: Pod
metadata:
  name: backend
  namespace: dev
  labels:
    app: backend            
spec:
  containers:
    - name: backend
      image: hashicorp/http-echo:latest
      args: ["-listen=:8080", "-text=hello from backend"]
      ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Pod
metadata:
  name: frontend
  namespace: dev
  labels:
    app: frontend           
spec:
  containers:
    - name: frontend
      image: curlimages/curl:latest
      command: ["sleep", "3600"]
---
apiVersion: v1
kind: Pod
metadata:
  name: other-pod
  namespace: dev
  labels:
    app: other              
spec:
  containers:
    - name: curl
      image: curlimages/curl:latest
      command: ["sleep", "3600"]
