apiVersion: v1
kind: Pod
metadata:
  name: restricted-pod
  namespace: dev
  labels:
    app: restricted-app
    env: dev
spec:
  securityContext:
    runAsNonRoot: true         
    runAsUser: 10001            
    runAsGroup: 10001           
    fsGroup: 10001              
    seccompProfile:
      type: RuntimeDefault      
  containers:
    - name: restricted-container
      image: gcr.io/distroless/static-debian11:nonroot  
      command: ["/bin/sleep"]   
      args: ["3600"]
      ports:
        - containerPort: 8080   
      securityContext:
        privileged: false
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
        readOnlyRootFilesystem: true
        runAsNonRoot: true
        runAsUser: 10001
      volumeMounts:
        - name: tmp-dir
          mountPath: /tmp
        - name: cache-dir
          mountPath: /var/cache/app

      resources:
        requests:
          cpu: "100m"
          memory: "64Mi"
        limits:
          cpu: "250m"
          memory: "128Mi"
  volumes:
    - name: tmp-dir
      emptyDir: {}
    - name: cache-dir
      emptyDir:
        medium: Memory      
  restartPolicy: Never
