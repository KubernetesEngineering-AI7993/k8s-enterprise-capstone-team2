# ─────────────────────────────────────────────────────────────────────────────
# prometheus-scrape-config.yaml
#
# Three sections:
#   1. Prometheus Operator — ServiceMonitor for the application
#   2. Prometheus Operator — PodMonitor for sidecar / direct pod scraping
#   3. Raw prometheus.yml scrape_configs snippet (for non-Operator installs)
#
# Resource metrics (CPU / memory) come from kube-state-metrics and
# node-exporter, which ship with kube-prometheus-stack. No extra config needed
# for those — the stack auto-discovers them. The ServiceMonitor below targets
# the application's /metrics endpoint.
# ─────────────────────────────────────────────────────────────────────────────

# ─────────────────────────────────────────────────────────────────────────────
# 1. Namespace (if not already created)
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: dev

---
# ─────────────────────────────────────────────────────────────────────────────
# 2. Example application Deployment (exposes /metrics on port 8080)
#    Replace image / args with your real workload.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app
  namespace: dev
  labels:
    app: sample-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sample-app
  template:
    metadata:
      labels:
        app: sample-app
      annotations:
        # Prometheus auto-discovery annotations (for raw Prometheus installs)
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: app
          image: quay.io/brancz/prometheus-example-app:v0.3.0  # real image exposing Go metrics
          ports:
            - name: http-metrics    # named port — referenced by ServiceMonitor below
              containerPort: 8080
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "128Mi"
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          readinessProbe:
            httpGet:
              path: /metrics
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10

---
# ─────────────────────────────────────────────────────────────────────────────
# 3. Service exposing the metrics port (required for ServiceMonitor discovery)
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: sample-app
  namespace: dev
  labels:
    app: sample-app           # must match ServiceMonitor selector below
spec:
  selector:
    app: sample-app
  ports:
    - name: http-metrics      # named port — must match ServiceMonitor endpoint
      port: 8080
      targetPort: http-metrics

---
# ─────────────────────────────────────────────────────────────────────────────
# 4. ServiceMonitor (Prometheus Operator CRD)
#    Tells the Operator to scrape this Service every 15 seconds.
#    Requires kube-prometheus-stack or prometheus-operator installed.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: sample-app
  namespace: dev
  labels:
    release: prometheus       # must match Prometheus CR's serviceMonitorSelector
spec:
  selector:
    matchLabels:
      app: sample-app         # selects the Service above
  namespaceSelector:
    matchNames:
      - dev
  endpoints:
    - port: http-metrics      # named port from the Service
      path: /metrics
      interval: 15s           # scrape every 15 seconds
      scrapeTimeout: 10s
      honorLabels: false      # use Prometheus server-side labels over app labels
      relabelings:
        # Carry the pod name and namespace as labels on every time series
        - sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: pod
        - sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: namespace

---
# ─────────────────────────────────────────────────────────────────────────────
# 5. PrometheusRule — alerting rules for this application
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: sample-app-alerts
  namespace: dev
  labels:
    release: prometheus       # must match Prometheus CR's ruleSelector
spec:
  groups:
    - name: sample-app.availability
      interval: 30s
      rules:
        # Alert: HTTP error rate > 5% over 5 minutes
        - alert: HighErrorRate
          expr: |
            (
              sum(rate(http_requests_total{namespace="dev", code=~"5.."}[5m]))
              /
              sum(rate(http_requests_total{namespace="dev"}[5m]))
            ) > 0.05
          for: 2m
          labels:
            severity: warning
            namespace: dev
          annotations:
            summary: "High HTTP error rate in dev"
            description: "Error rate is {{ $value | humanizePercentage }} over the last 5 minutes."

        # Alert: p99 latency > 500ms
        - alert: HighLatencyP99
          expr: |
            histogram_quantile(0.99,
              sum(rate(http_request_duration_seconds_bucket{namespace="dev"}[5m])) by (le)
            ) > 0.5
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "p99 latency above 500ms"
            description: "p99 latency is {{ $value | humanizeDuration }}."

    - name: sample-app.resources
      rules:
        # Alert: Pod CPU throttling > 25%
        - alert: PodCpuThrottling
          expr: |
            sum(rate(container_cpu_cfs_throttled_seconds_total{namespace="dev", container!=""}[5m]))
            by (pod, container)
            /
            sum(rate(container_cpu_cfs_periods_total{namespace="dev", container!=""}[5m]))
            by (pod, container)
            > 0.25
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.pod }} CPU throttled > 25%"

        # Alert: Pod memory > 90% of limit
        - alert: PodMemoryNearLimit
          expr: |
            container_memory_working_set_bytes{namespace="dev", container!=""}
            /
            container_spec_memory_limit_bytes{namespace="dev", container!=""}
            > 0.9
          for: 3m
          labels:
            severity: critical
          annotations:
            summary: "Pod {{ $labels.pod }} memory at {{ $value | humanizePercentage }} of limit"

---
