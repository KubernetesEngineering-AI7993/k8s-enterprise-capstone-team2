apiVersion: v1
kind: Namespace
metadata:
  name: dev
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app
  namespace: dev
  labels:
    app: sample-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sample-app
  template:
    metadata:
      labels:
        app: sample-app
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: app
          image: quay.io/brancz/prometheus-example-app:v0.3.0  
          ports:
            - name: http-metrics    
              containerPort: 8080
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "128Mi"
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          readinessProbe:
            httpGet:
              path: /metrics
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: sample-app
  namespace: dev
  labels:
    app: sample-app           
spec:
  selector:
    app: sample-app
  ports:
    - name: http-metrics      
      port: 8080
      targetPort: http-metrics

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: sample-app
  namespace: dev
  labels:
    release: prometheus       
spec:
  selector:
    matchLabels:
      app: sample-app        
  namespaceSelector:
    matchNames:
      - dev
  endpoints:
    - port: http-metrics      
      path: /metrics
      interval: 15s           
      scrapeTimeout: 10s
      honorLabels: false      
      relabelings:
        - sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: pod
        - sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: namespace

---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: sample-app-alerts
  namespace: dev
  labels:
    release: prometheus      
spec:
  groups:
    - name: sample-app.availability
      interval: 30s
      rules:
        - alert: HighErrorRate
          expr: |
            (
              sum(rate(http_requests_total{namespace="dev", code=~"5.."}[5m]))
              /
              sum(rate(http_requests_total{namespace="dev"}[5m]))
            ) > 0.05
          for: 2m
          labels:
            severity: warning
            namespace: dev
          annotations:
            summary: "High HTTP error rate in dev"
            description: "Error rate is {{ $value | humanizePercentage }} over the last 5 minutes."
        - alert: HighLatencyP99
          expr: |
            histogram_quantile(0.99,
              sum(rate(http_request_duration_seconds_bucket{namespace="dev"}[5m])) by (le)
            ) > 0.5
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "p99 latency above 500ms"
            description: "p99 latency is {{ $value | humanizeDuration }}."

    - name: sample-app.resources
      rules:
        - alert: PodCpuThrottling
          expr: |
            sum(rate(container_cpu_cfs_throttled_seconds_total{namespace="dev", container!=""}[5m]))
            by (pod, container)
            /
            sum(rate(container_cpu_cfs_periods_total{namespace="dev", container!=""}[5m]))
            by (pod, container)
            > 0.25
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.pod }} CPU throttled > 25%"
        - alert: PodMemoryNearLimit
          expr: |
            container_memory_working_set_bytes{namespace="dev", container!=""}
            /
            container_spec_memory_limit_bytes{namespace="dev", container!=""}
            > 0.9
          for: 3m
          labels:
            severity: critical
          annotations:
            summary: "Pod {{ $labels.pod }} memory at {{ $value | humanizePercentage }} of limit"

---
