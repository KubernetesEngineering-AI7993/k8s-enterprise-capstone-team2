apiVersion: v1
kind: Pod
metadata:
  name: insecure-pod
  namespace: pss-lab
spec:
  hostPID: true
  containers:
  - name: insecure
    image: busybox:1.36
    command: ["sh", "-c", "sleep 3600"]
    securityContext:
      privileged: true
      runAsUser: 0
    volumeMounts:
    - name: host-root
      mountPath: /host
  volumes:
  - name: host-root
    hostPath:
      path: /
