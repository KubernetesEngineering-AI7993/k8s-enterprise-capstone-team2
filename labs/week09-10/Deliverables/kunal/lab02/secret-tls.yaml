# =============================================================================
# AdGuard Home – TLS Secret
# =============================================================================
# In production, AdGuard Home can serve HTTPS using a TLS certificate.
# This demonstrates how TLS certs are stored as Kubernetes Secrets.
#
# The cert and key below are self-signed and for lab use ONLY.
#
# To generate a real self-signed cert for testing:
#   openssl req -x509 -newkey rsa:4096 -keyout tls.key -out tls.crt \
#     -days 365 -nodes -subj '/CN=adguard.local'
#   kubectl create secret tls adguard-tls \
#     --cert=tls.crt --key=tls.key -n adguard-home
#
# Equivalent kubectl command:
#   kubectl create secret tls adguard-tls \
#     --cert=tls.crt \
#     --key=tls.key \
#     -n adguard-home
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: adguard-tls
  namespace: adguard-home
  labels:
    app: adguard-home
    lab: week09-10-lab02
# type: kubernetes.io/tls is enforced — both tls.crt and tls.key are required
type: kubernetes.io/tls
data:
  # Placeholder values — replace with real base64-encoded cert/key
  # cat tls.crt | base64 -w 0
  tls.crt: UExBQ0VIT0xERVItQ0VSVA==
  # cat tls.key | base64 -w 0
  tls.key: UExBQ0VIT0xERVItS0VZ
