name: Validate and deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate manifests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run manifest validation
        run: |
          chmod +x ./validate.sh
          ./validate.sh k8s/manifests

      - name: Save validation output
        if: always()
        run: |
          chmod +x ./validate.sh
          ./validate.sh k8s/manifests > validation-report.txt 2>&1 || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: validation-report
          path: validation-report.txt

  trivy-scan:
    name: Trivy security scan
    runs-on: ubuntu-latest
    needs: validate         

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t my-app:${{ github.sha }} .

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: my-app:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: 0
          ignore-unfixed: true
          output: trivy-report.txt

      - name: Upload Trivy report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report
          path: trivy-report.txt

      - name: Fail if vulnerabilities found
        run: |
          if grep -q "CRITICAL\|HIGH" trivy-report.txt; then
            echo "CRITICAL or HIGH vulnerabilities found — deploy blocked"
            cat trivy-report.txt
            exit 1
          fi

  deploy:
    name: Deploy to cluster
    runs-on: ubuntu-latest
    needs: [validate, trivy-scan]   

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Apply manifests
        run: |
          kubectl apply -f k8s/manifests/
       
