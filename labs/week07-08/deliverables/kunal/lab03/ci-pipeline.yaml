name: CI Pipeline
on:
  pull_request:
    types: [closed]
jobs:
  validate-and-deploy:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Validate YAML
      run: |
        set -e
        BASE="labs/week07-08/deliverables/kunal"
        for f in $(find "$BASE" -name '*.yaml' -o -name '*.yml' 2>/dev/null); do
          [[ "$f" == *"/templates/"* ]] && continue
          echo "  Validating $f"
          python3 -c "import yaml; yaml.safe_load(open('$f'))"
        done
        echo "YAML validation passed."

    - name: Build container image (mock)
      run: |
        echo "Building container image (mock - no Dockerfile in scope). In production: docker build && push to registry."

    - name: Set up Helm
      uses: azure/setup-helm@v4
      with:
        version: 'v3.13.0'

    - name: Deploy (Helm template / dry-run)
      run: |
        helm template sample-app labs/week07-08/deliverables/kunal/lab01/sample-app --namespace dev
        echo "Deploy step: in production use helm upgrade --install or kubectl apply with cluster credentials."
