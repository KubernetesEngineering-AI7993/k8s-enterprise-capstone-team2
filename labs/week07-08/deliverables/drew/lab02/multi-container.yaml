apiVersion: v1
kind: Pod
metadata:
  name: sidecar-demo
  namespace: default
spec:
  containers:
  - name: main-app
    image: nginx:1.27
    ports:
    - containerPort: 80
    volumeMounts:
    - name: shared-logs
      mountPath: /var/log/nginx
  - name: log-sidecar
    image: busybox:1.36
    command: ["sh", "-c", "while true; do echo '[sidecar] Log entries:'; cat /var/log/nginx/access.log 2>/dev/null || echo 'No logs yet'; sleep 10; done"]
    volumeMounts:
    - name: shared-logs
      mountPath: /var/log/nginx
  volumes:
  - name: shared-logs
    emptyDir: {}