apiVersion: apps/v1
kind: Deployment
metadata:
  name: selector-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: selector-demo
  template:
    metadata:
      labels:
        app: selector-demo
    spec:
      containers:
      - name: app
        image: nginx
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: selector-demo-svc
spec:
  selector:
    app: selector-demo-wrong
  ports:
    - port: 80
      targetPort: 80
