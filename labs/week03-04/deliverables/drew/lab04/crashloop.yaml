apiVersion: apps/v1
kind: Deployment
metadata:
  name: crashloop-demo
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crashloop-demo
  template:
    metadata:
      labels:
        app: crashloop-demo
    spec:
      containers:
      - name: demo
        image: busybox:1.36.1
        command: ["sh","-c","echo starting; sleep 2; exit 1"]
