apiVersion: apps/v1
kind: Deployment
metadata:
  name: resource-demo
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: resource-demo
  template:
    metadata:
      labels:
        app: resource-demo
    spec:
      containers:
      - name: cpu-burn
        image: busybox:1.36
        command: ["/bin/sh","-c"]
        args:
        - "while true; do :; done"
        resources:
          requests:
            cpu: "100m"
            memory: "32Mi"
          limits:
            cpu: "200m"
            memory: "64Mi"
