apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: warehouse-cv-addons-dev
  namespace: argocd
spec:
  project: warehouse-cv
  source:
    repoURL: https://github.com/KubernetesEngineering-AI7993/k8s-enterprise-capstone-team2.git
    targetRevision: mlops
    path: k8s/overlays/addons-dev
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m
